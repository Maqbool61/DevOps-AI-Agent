---
apiVersion: v1
kind: Service
metadata:
  name: devops-ai-agent
  namespace: devops-tools
spec:
  selector:
    app: devops-ai-agent
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-ai-agent-config
  namespace: devops-tools
data:
  AUTO_APPLY: "false"
  MAX_AGENT_STEPS: "10"
  ALLOWED_NAMESPACES: "default,staging"
  LOG_LEVEL: "INFO"
  PORT: "8000"

---
# Create this secret separately with real values:
# kubectl create secret generic devops-ai-agent-secrets \
#   --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#   --from-literal=SLACK_WEBHOOK_URL=https://hooks.slack.com/... \
#   --from-literal=GITHUB_TOKEN=ghp_... \
#   --from-literal=WEBHOOK_SECRET=your-random-secret \
#   -n devops-tools
