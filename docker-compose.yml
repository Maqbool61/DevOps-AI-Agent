version: "3.9"

services:
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount kubeconfig for local dev
      - ~/.kube:/home/appuser/.kube:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: local webhook proxy for testing with ngrok
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   command: http agent:8000
  #   ports:
  #     - "4040:4040"
  #   environment:
  #     NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
